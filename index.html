  document.getElementById("quiz").classList.remove("fade");
  void document.getElementById("quiz").offsetWidth;
  document.getElementById("quiz").classList.add("fade");

  document.getElementById("question").innerText = q.q;

  // เลขข้อ
  document.getElementById("qNumber").innerText =
    (current + 1) + "/" + quizData.length;

  // progress bar
  let percent = ((current + 1) / quizData.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";

  const box = document.getElementById("choices");
  box.innerHTML = "";
  selected = null;

  q.c.forEach((choice, i) => {
    const div = document.createElement("div");
    div.className = "choice";
    div.innerText = choice;

    div.onclick = () => {
      selected = i;

      document.querySelectorAll(".choice").forEach(el => el.style.background = "#e5faff");
      div.style.background = "#ffcce5";
    };

    box.appendChild(div);
  });
}

function nextQ() {
  if (selected === null) {
    alert("เลือกคำตอบก่อนน้าา");
    return;
  }

  score[selected]++;
  current++;

  if (current < quizData.length) {
    loadQ();
  } else {
    showResult();
  }
}

function prevQ() {
  if (current > 0) {
    current--;
    loadQ();
  }
}

function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let maxIndex = score.indexOf(Math.max(...score));

  const groupSize = Math.floor(results.length / 4);
  const start = maxIndex * groupSize;
  const end = start + groupSize;

  const resultIndex = Math.floor(Math.random() * (end - start)) + start;

  const res = results[resultIndex];
  document.getElementById("resultImg").src = res.img;
  document.getElementById("resultText").innerText = res.text;
}
</script>

</html>
